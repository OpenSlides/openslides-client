<mat-dialog-content>
    <os-poll-form [data]="pollData" [isEVotingEnabled]="isEVotingEnabled" [optionEdit]="true">
        <os-poll-form-selection optionType="text" [data]="pollData" />
    </os-poll-form>
</mat-dialog-content>

<!-- Actions -->
<mat-dialog-actions>
    <!-- Save Button -->
    <button mat-button [disabled]="!formsValid" (click)="submitPoll()">
        <span>{{ 'Save' | translate }}</span>
    </button>

    <!-- Cancel Button -->
    <button mat-button [mat-dialog-close]="false">
        <span>{{ 'Cancel' | translate }}</span>
    </button>
</mat-dialog-actions>
