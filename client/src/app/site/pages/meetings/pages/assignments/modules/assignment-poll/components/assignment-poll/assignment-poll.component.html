@if (showPoll) {
    <mat-card class="os-card">
        <mat-card-content>
            <os-poll
                [allowEdit]="true"
                [navigateToPollDetail]="true"
                [poll]="poll"
                (dialogOpened)="dialogOpened.emit($event)"
            />
        </mat-card-content>
    </mat-card>
}
