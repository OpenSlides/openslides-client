@switch (configType()) {
    @case ('poll_config_approval') {
        <os-poll-result-approval [poll]="poll()" />
    }
    @case ('poll_config_rating_approval') {
        <os-poll-result-rating-approval [poll]="poll()" />
    }
    @case ('poll_config_selection') {
        <os-poll-result-selection [poll]="poll()" />
    }
}
