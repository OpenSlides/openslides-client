<button
    class="vote-button"
    mat-raised-button
    role="radio"
    [ariaLabel]="optionTitle()"
    [attr.aria-checked]="isSelected() ? 'true' : 'false'"
    [disabled]="loading()"
    (click)="toggleOption.emit(!isSelected())"
>
    <div class="vote-button-content" [class.button-content-opaque]="!isSelected()">
        <os-custom-icon class="vote-button-cross" [class]="votedClass()" [customIcon]="drawnCross"></os-custom-icon>
        <mat-icon class="vote-button-circle">radio_button_unchecked</mat-icon>
    </div>
</button>
